<!DOCTYPE html>
<html>
<head>
    <title>AI Coach Debug</title>
</head>
<body>
    <h2>AI Coach Debug Test</h2>
    <button onclick="testAI()">Test AI Coach</button>
    <pre id="result"></pre>

    <script>
    async function testAI() {
        const resultDiv = document.getElementById('result');
        resultDiv.textContent = 'Testing...';
        
        try {
            const response = await fetch('https://gfqgjnytfgnpfiquqixt.supabase.co/functions/v1/ai-coach', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer test-token', // This will fail but show us the error
                },
                body: JSON.stringify({
                    message: 'Hello, this is a test',
                    userContext: { goals: [] },
                    history: [],
                    requestSuggestions: true
                }),
            });
            
            console.log('Response status:', response.status);
            console.log('Response headers:', Object.fromEntries(response.headers.entries()));
            
            const data = await response.text();
            console.log('Raw response:', data);
            
            resultDiv.textContent = `Status: ${response.status}\nResponse: ${data}`;
            
        } catch (error) {
            console.error('Error:', error);
            resultDiv.textContent = `Error: ${error.message}`;
        }
    }
    </script>
</body>
</html>
